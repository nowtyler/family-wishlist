[alembic]
script_location = migrations
sqlalchemy.url = sqlite:///./data/wishlist.db
render_as_batch = true
compare_type = true
transaction_per_migration = true

# SQLite-specific settings
sqlite_pragmas = 
    foreign_keys=ON
    synchronous=NORMAL
    journal_mode=WAL

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
