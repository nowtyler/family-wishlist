####### Wishlist Service Production #######
services:
  frontend:
    image: tylernow/family-wishlist:latest-frontend
    container_name: wishlist-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - ENVIRONMENT=prod # Environment type
      - FAMILY_PASSWORD_HASH=${FAMILY_PASSWORD_HASH}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL} # Backend API URL
      - DOMAIN_NAME=${ROOT_DOMAIN} # Domain name for the service
      - PUID=${PUID} # User ID for file permissions
      - PGID=${PGID} # Group ID for file permissions
      - TZ=${TZ} # Timezone
    networks:
      - frontend
      - backend
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.constraint=proxy-public
#      - traefik.http.routers.open-webui.middlewares=authentik@file
      - traefik.http.routers.wishlist-frontend.rule=Host(`wishlist.${ROOT_DOMAIN}`)
      - traefik.http.routers.wishlist-frontend.tls=true
      - traefik.http.routers.wishlist-frontend.entrypoints=websecure
      - traefik.http.services.wishlist-frontend.loadbalancer.server.port=80
      # Add a comment to explain the routing
      # ^ This routes wishlist.domain.com to this container's port 80

  backend:
     image: tylernow/family-wishlist:latest-backend
     container_name: wishlist-backend
     restart: unless-stopped
     environment:
      - ENVIRONMENT=prod
      - WISHLIST_DATABASE_URL=sqlite:///./data/wishlist.db # Fixed path inside container
      - FAMILY_PASSWORD_HASH=${FAMILY_PASSWORD_HASH} # Password hash for family access
      - DOMAIN_NAME=${ROOT_DOMAIN} # Domain name for the service
      - PUID=${PUID} # User ID for file permissions
      - PGID=${PGID} # Group ID for file permissions
      - TZ=${TZ} # Timezone
      - FAMILY_MEMBERS_CONFIG=${FAMILY_MEMBERS_CONFIG}
      - CHRISTMAS_MONTH=${CHRISTMAS_MONTH}
      - CHRISTMAS_DAY=${CHRISTMAS_DAY}
      - EMERGENCY_ACCESS_TOKEN=${EMERGENCY_ACCESS_TOKEN} # Emergency admin access token
      - EMERGENCY_ALLOWED_HOSTS=${EMERGENCY_ALLOWED_HOSTS:-127.0.0.1,localhost,::1} # Allowed hosts for emergency access
     volumes:
      - ${LOCAL_APPS_PATH}family-wishlist/data:/app/data  # Production data path
      - ${LOCAL_APPS_PATH}family-wishlist/data/backups:/app/data/backups
      - ${LOCAL_APPS_PATH}family-wishlist/data/migrations:/app/app/migrations/versions
      # For development, you might mount the code:
      # - ./backend/app:/app/app
     networks:
      - backend 
     expose: # Expose port to internal network, Traefik will handle external
      - 8000
     labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      # Basic routing
      - traefik.http.routers.wishlist-backend.rule=Host(`wishlist.${ROOT_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.wishlist-backend.tls=true
      - traefik.http.routers.wishlist-backend.entrypoints=websecure
      - traefik.http.services.wishlist-backend.loadbalancer.server.port=8000
      # ^ This routes wishlist.domain.com/api to this container's port 8000
      # Timeouts and healthcheck
      - traefik.http.middlewares.wishlist-backend-timeouts.forwardauth.trustForwardHeader=true
      - traefik.http.routers.wishlist-backend.middlewares=wishlist-backend-timeouts
      - traefik.http.middlewares.wishlist-backend-timeouts.headers.customRequestHeaders.X-Forwarded-Proto=https
      # Add response timeouts
      - traefik.http.middlewares.wishlist-backend-timeouts.headers.customResponseHeaders.X-Gateway-Timeout=30

####### Wishlist Service Non-Production #######

  dev-frontend:
    image: tylernow/family-wishlist:dev-frontend
    container_name: wishlist-dev-frontend
    restart: unless-stopped
    depends_on:
      - dev-backend
    environment:
      - ENVIRONMENT=dev # Explicitly set to 'dev'
      - BACKEND_SERVICE=dev-backend # Explicitly set the backend service name
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d # Ensure environment substitution happens
      - FAMILY_PASSWORD_HASH=${FAMILY_PASSWORD_HASH}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL} # Backend API URL
      - DOMAIN_NAME=${ROOT_DOMAIN} # Domain name for the service
      - PUID=${PUID} # User ID for file permissions
      - PGID=${PGID} # Group ID for file permissions
      - TZ=${TZ} # Timezone
      - MODE=development # Add mode for Vite
