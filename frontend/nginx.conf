# frontend/nginx.conf
server {
    listen 80;
    
    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Frontend - serve static files and handle SPA routing
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This ensures ALL paths are sent to index.html for React Router
        try_files $uri $uri/ /index.html;
    }
    
    # API proxy - forward requests to backend
    location /api/ {
        # Fixed proxy_pass URL with trailing slash
        proxy_pass http://backend:8000/api/;
        
        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Websocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Enhanced logging for debugging API calls
        access_log /var/log/nginx/api_access.log;
        error_log /var/log/nginx/api_error.log debug;
        
        # Add request debugging
        add_header X-Debug-Path $uri;
        add_header X-Debug-Backend "backend:8000";
    }
    
    # OpenAPI documentation
    location /docs/ {
        proxy_pass http://backend:8000/docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /redoc/ {
        proxy_pass http://backend:8000/redoc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # For debugging the API directly
    location /debug-api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    
    # Log configuration to ensure proper debugging
    error_log /var/log/nginx/error.log debug;
    access_log /var/log/nginx/access.log;
}