# frontend/nginx.conf
server {
    listen 80;
    server_name localhost;
    
    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Frontend - serve static files and handle SPA routing
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This ensures ALL paths are sent to index.html for React Router
        try_files $uri $uri/ /index.html;

        # Debug headers
        add_header X-Debug-Path $uri;
        add_header X-Debug-Host $host;
    }
    
    # API proxy - forward requests to backend
    location /api/ {
        # Fixed proxy_pass URL - properly handle the API path
        proxy_pass http://wishlist-backend:8000/api/;
        
        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        
        # Websocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Debug headers
        add_header X-Debug-Path $uri;
        add_header X-Debug-Backend "http://wishlist-backend:8000/api/";
        add_header X-Debug-Host $host;
        
        # Disable caching for API requests
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        
        # Increase timeouts for slower API responses
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # OpenAPI documentation
    location /docs {
        # Fixed documentation access - no trailing slash
        proxy_pass http://wishlist-backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /redoc {
        proxy_pass http://wishlist-backend:8000/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # For direct backend health check
    location = /health {
        proxy_pass http://wishlist-backend:8000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    
    # Log configuration to ensure proper debugging
    error_log /var/log/nginx/error.log debug;
    access_log /var/log/nginx/access.log;
}