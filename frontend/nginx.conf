# frontend/nginx.conf
server {
    listen 80;
    server_name localhost; # Or your domain, though Traefik handles external domain
    root /usr/share/nginx/html;
    index index.html index.htm;

    # API proxy - ensure correct backend service name
    location /api/ {
        proxy_pass http://backend:8000/api/;  # Use the Docker service name
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Handle OPTIONS requests for CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Current-User-Id' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        
        # Add CORS headers for actual requests
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Current-User-Id' always;
    }

    # For React Router (or any SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent Nginx version disclosure
    server_tokens off;

    # Opt-out of FLoC
    location = / {
        add_header "Permissions-Policy: interest-cohort=()" always;
        try_files $uri $uri/ /index.html; # Redundant from above but safe
    }

    # Cache control for static assets (optional fine-tuning)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}