# frontend/nginx.conf
server {
    listen 80;
    server_name https://wishlist.ariahive.top; # Or your domain, though Traefik handles external domain
    root /usr/share/nginx/html;
    index index.html index.htm;

    # For React Router (or any SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: If you were to proxy API calls through Nginx instead of Vite's dev server
    # or directly through Traefik to the backend.
    # For our setup, Traefik will route /api to the backend service directly.
    #location /api/ {
    #    proxy_pass http://wishlist-backend:8888/api/; # 'backend' is the Docker service name
    #    proxy_set_header Host $host;
    #    proxy_set_header X-Real-IP $remote_addr;
    #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #    proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Prevent Nginx version disclosure
    server_tokens off;

    # Opt-out of FLoC
    location = / {
        add_header "Permissions-Policy: interest-cohort=()" always;
        try_files $uri $uri/ /index.html; # Redundant from above but safe
    }

    # Cache control for static assets (optional fine-tuning)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}