# Simple test configuration to verify service communication
version: '3.8'

networks:
  test-net:
    name: test-net

services:
  backend-test:
    image: nginx:alpine
    container_name: backend-test
    networks:
      - test-net
    volumes:
      - ./scripts/test:/usr/share/nginx/html
    command: /bin/sh -c "echo '{\"status\":\"healthy\"}' > /usr/share/nginx/html/api/health && nginx -g 'daemon off;'"
    
  frontend-test:
    image: alpine:latest
    container_name: frontend-test
    networks:
      - test-net
    command: >
      /bin/sh -c "
        apk add --no-cache curl &&
        echo 'Testing container-to-container communication...' &&
        echo 'Waiting for backend-test...' &&
        sleep 5 &&
        curl -v http://backend-test/api/health &&
        echo 'If you see a healthy response above, network connectivity works.' &&
        tail -f /dev/null
      "
    depends_on:
      - backend-test
