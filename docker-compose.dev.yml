version: '3.8'

services:
  backend:
    image: tylernow/family-wishlist:dev-backend
    environment:
      - ENVIRONMENT=dev
      - DEV_DATABASE_URL=sqlite:///./data/dev-wishlist.db
      - PROD_DATABASE_URL=sqlite:///./data/wishlist.db
      - FAMILY_PASSWORD_HASH=${FAMILY_PASSWORD_HASH}
      - FAMILY_MEMBERS_CONFIG=${FAMILY_MEMBERS_CONFIG}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    image: tylernow/family-wishlist:dev-frontend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "80:80"
    depends_on:
      - backend
