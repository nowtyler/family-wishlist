# Local development Docker Compose configuration
version: '3.8'

services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/wishlist.db}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
    environment:
      - BACKEND_URL=http://wishlist-backend:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
