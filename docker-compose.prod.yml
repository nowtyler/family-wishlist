# Production Docker Compose configuration
version: '3.8'

# Create a custom network for the application
networks:
  wishlist-net:
    driver: bridge

services:
  backend:
    image: tylernow/family-wishlist:latest-backend
    container_name: wishlist-backend
    networks:
      - wishlist-net
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/wishlist.db
      - FAMILY_PASSWORD_HASH=${FAMILY_PASSWORD_HASH}
      - FAMILY_MEMBERS_CONFIG=${FAMILY_MEMBERS_CONFIG}
      - CHRISTMAS_MONTH=${CHRISTMAS_MONTH:-12}
      - CHRISTMAS_DAY=${CHRISTMAS_DAY:-25}
      # Add CORS origins for your domain
      - CORS_ORIGINS=https://wishlist.ariahive.top,http://wishlist.ariahive.top
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
  frontend:
    image: tylernow/family-wishlist:latest-frontend
    container_name: wishlist-frontend
    networks:
      - wishlist-net
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      # Mount nginx logs for easier debugging
      - ./logs/nginx:/var/log/nginx
