# Override configuration for both local and production troubleshooting
version: '3.8'

services:
  frontend:
    environment:
      - BACKEND_URL=http://wishlist-backend:8000
    # Enable nginx debugging
    command: /bin/sh -c "nginx-debug -g 'daemon off;'"

  backend:
    ports:
      - "8000:8000"  # Expose backend port for direct testing
    environment:
      - LOG_LEVEL=DEBUG
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:80,http://localhost,http://wishlist-frontend:80,http://wishlist-frontend
