# Development environment Docker Compose configuration using dev tags
version: '3.8'

services:
  backend:
    image: tylernow/family-wishlist:dev-backend
    volumes:
      - ./data-dev:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/wishlist.db
      - CHRISTMAS_MONTH=${CHRISTMAS_MONTH:-12}
      - CHRISTMAS_DAY=${CHRISTMAS_DAY:-25}
    ports:
      - "8001:8000"
    restart: unless-stopped
    
  frontend:
    image: tylernow/family-wishlist:dev-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped
